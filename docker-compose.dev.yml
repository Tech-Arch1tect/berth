services:
  berth-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: berth-dev
    env_file: .env
    environment:
      - FRONTEND_DEVELOPMENT=true
      - SERVER_HOST=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
      - "5173:5173"
    volumes:
      - .:/app
      - ./app.db:/app/app.db
      - ./ssl:/app/ssl
      - ./storage/logs:/app/storage/logs
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - node-modules:/app/node_modules
      - berth-tmp:/app/tmp
    entrypoint: []
    command: ["/bin/sh", "-c", "npm run dev & air -c .air.toml"]

  ide:
    build:
      context: dev/ide
      dockerfile: Dockerfile
    container_name: berth-ide
    user: "${UID:-1000}:${GID:-1000}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "8099:8080"
    volumes:
      - .:/home/coder/project
      - dev-ide-state:/home/coder/.local/share/code-server/User
    command:
      - --auth=none
      - --disable-telemetry
      - --bind-addr=0.0.0.0:8080
      - /home/coder/project

volumes:
  go-mod-cache:
  go-build-cache:
  node-modules:
  berth-tmp:
  dev-ide-state:
