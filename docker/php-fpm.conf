[www]
user = appuser
group = appgroup
listen = 127.0.0.1:9000
listen.owner = appuser
listen.group = appgroup
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500
pm.process_idle_timeout = 10s
clear_env = no
catch_workers_output = yes