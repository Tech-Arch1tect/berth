<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

        <title>berth</title>
        <link rel="manifest" href="/pwa/manifest.webmanifest" />
        <meta name="theme-color" content="#0d9488" />
        <link rel="icon" href="/pwa/favicon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/pwa/apple-touch-icon-180.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="berth" />
        {{ if .isDevelopment }}
        <!-- Vite Dev Server -->
        <script type="module">
            import RefreshRuntime from '{{ .viteDevURL }}/@react-refresh'
            RefreshRuntime.injectIntoGlobalHook(window)
            window.$RefreshReg$ = () => {}
            window.$RefreshSig$ = () => (type) => type
            window.__vite_plugin_react_preamble_installed__ = true
        </script>
        <script type="module" src="{{ .viteDevURL }}/@vite/client"></script>
        <script type="module" src="{{ .viteDevURL }}/resources/js/app.tsx"></script>
        {{ else }}
        <!-- Production Assets -->
        {{ range .cssAssets }}<link rel="stylesheet" href="{{ . }}" />{{ end }}
        {{ range .jsAssets }}<script type="module" src="{{ . }}"></script>{{ end }}
        {{ end }}
    </head>
    <body>
        <div id="app"></div>
    </body>
</html>
